services:
  postgres:
    image: postgres:16-alpine
    container_name: lark_postgres
    restart: unless-stopped
    entrypoint: ["/docker-entrypoint-initdb.d/pg-entrypoint-wrapper.sh"]
    command: ["postgres"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-db_laundry}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Password sync scripts — mounted into initdb.d for access
      - ./docker/init-sync-password.sh:/docker-entrypoint-initdb.d/init-sync-password.sh:ro
      - ./docker/sync-password.sh:/docker-entrypoint-initdb.d/sync-password.sh:ro
      - ./docker/pg-entrypoint-wrapper.sh:/docker-entrypoint-initdb.d/pg-entrypoint-wrapper.sh:ro
#    ports:
#      - "5432:5432"
    networks:
      - lark_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-db_laundry}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lark_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-db_laundry}?schema=public
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lark_internal
    ports:
      - "80:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    driver: local

networks:
  lark_internal:
    driver: bridge
